{% extends 'base.html' %}
{% block content %}
<h2>Book a Hall</h2>
<form method="POST">
  <div class="mb-3">
    <label>Hall</label>
    <select name="hall_id" class="form-control">
      {% for hall in halls %}
      <option value="{{ hall['id'] }}">{{ hall['name'] }} (Capacity: {{ hall['capacity'] }})</option>
      {% endfor %}
    </select>
  </div>
  <div class="mb-3">
    <label>Date</label>
    <input type="date" name="date" class="form-control" required>
  </div>
  <div class="mb-3">
    <label>Time Slot</label>
    <input type="text" name="time_slot" class="form-control" placeholder="e.g. 10AM-12PM" required>
  </div>
  <button type="submit" class="btn btn-success">Book</button>
</form>
{% endblock %}
